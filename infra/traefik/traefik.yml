api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
        # This allows Traefik to trust the headers sent by the tunnel
        insecure: true

# Enable this if you want to use Traefik's built-in ACME support for automatic certificate management
